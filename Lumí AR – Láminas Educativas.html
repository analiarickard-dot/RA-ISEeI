<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Lumí AR – Láminas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#0a0818;color:white;height:100dvh;overflow:hidden;width:100vw}

/* ── WELCOME ── */
#welcome{position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,#0f0c2e,#1a1040,#0b1e3f);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;padding:2rem;text-align:center}
.stars-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d) ease-in-out infinite alternate;opacity:0}
@keyframes twinkle{from{opacity:0}to{opacity:var(--o)}}
.lumi-orb{width:110px;height:110px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffe87c,#f97316 60%,#c2410c);box-shadow:0 0 40px #f97316aa;display:flex;align-items:center;justify-content:center;font-size:3.2rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.wtitle{font-size:2.6rem;font-weight:900;line-height:1.1}
.wtitle span{background:linear-gradient(90deg,#ffe87c,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.wsub{font-size:1rem;color:#a5b4fc;max-width:300px;line-height:1.6}
.start-btn{background:linear-gradient(135deg,#f97316,#fbbf24);color:#1a0a00;font-family:'Nunito',sans-serif;font-size:1.15rem;font-weight:900;border:none;border-radius:100px;padding:.9rem 2.4rem;cursor:pointer;box-shadow:0 8px 30px #f9731666}

/* ── MAIN APP ── */
#app{display:none;position:fixed;inset:0;z-index:100;flex-direction:column}
#app.show{display:flex}

/* Camera feed (simulated with gradient + iframe trick) */
#cam-area{position:relative;flex:1;background:#111;overflow:hidden}
#cam-feed{width:100%;height:100%;object-fit:cover;display:block;opacity:0.35;filter:saturate(0)}

/* AR overlay canvas */
#ar-canvas{position:absolute;inset:0;width:100%;height:100%}

/* Top bar */
#topbar{position:absolute;top:0;left:0;right:0;padding:.8rem 1rem;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,.65),transparent);z-index:10}
.logo{font-weight:900;font-size:1.05rem;color:#fbbf24}.logo span{color:white}
.back-btn{background:rgba(255,255,255,.12);border:none;color:white;border-radius:100px;padding:.3rem .9rem;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer}

/* Scan ring */
#scan-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);display:flex;flex-direction:column;align-items:center;gap:.8rem;pointer-events:none;transition:opacity 1s}
.ring{width:110px;height:110px;border:2px dashed rgba(251,191,36,.7);border-radius:50%;animation:spin 6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-txt{font-size:.85rem;color:rgba(255,255,255,.8);text-align:center}

/* ── BOTTOM PANEL ── */
#bottom{background:rgba(8,6,24,.92);backdrop-filter:blur(18px);border-top:1px solid rgba(139,92,246,.25);padding:.8rem 1rem 1rem}

/* Tab bar */
#tabs{display:flex;gap:.5rem;margin-bottom:.8rem}
.tab{flex:1;text-align:center;padding:.45rem .3rem;border-radius:10px;font-size:.8rem;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .2s;color:#64748b}
.tab.active{background:linear-gradient(135deg,#7c3aed22,#6366f122);border-color:rgba(139,92,246,.4);color:#a78bfa}

/* Láminas carousel */
#laminas-panel{display:block}
.laminas-scroll{display:flex;gap:.7rem;overflow-x:auto;padding-bottom:.4rem;scrollbar-width:none}
.laminas-scroll::-webkit-scrollbar{display:none}
.lamina-card{flex-shrink:0;width:110px;border-radius:14px;overflow:hidden;border:2px solid transparent;cursor:pointer;transition:border-color .2s,transform .15s;background:#1e1b4b}
.lamina-card.active{border-color:#f97316;transform:scale(1.05)}
.lamina-img{width:100%;height:75px;display:flex;align-items:center;justify-content:center;font-size:2.4rem}
.lamina-label{padding:.3rem .4rem;font-size:.72rem;font-weight:700;color:#e2e8f0;text-align:center;line-height:1.2}

/* Lesson panel */
#lesson-panel{display:none}
.lesson-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.6rem}
.l-avatar{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffe87c,#f97316);display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 0 10px #f9731666;animation:float 3s ease-in-out infinite;flex-shrink:0}
.l-name{font-weight:900;font-size:.92rem;color:#fbbf24}
.l-role{font-size:.7rem;color:#818cf8}
.lesson-txt{font-size:.88rem;color:#e2e8f0;line-height:1.6;min-height:2.8em}
.lesson-txt .hl{color:#fbbf24;font-weight:700}
.lesson-nav{display:flex;justify-content:space-between;align-items:center;margin-top:.7rem}
.nav-btn{background:rgba(139,92,246,.2);border:1px solid rgba(139,92,246,.35);color:#a78bfa;border-radius:100px;padding:.38rem .95rem;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer}
.nav-btn.next{background:linear-gradient(135deg,#7c3aed,#6366f1);border-color:transparent;color:white}
.dots{display:flex;gap:4px}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2)}
.dot.on{background:#fbbf24}

/* AR sticker on canvas */
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome">
  <div class="stars-bg" id="starsBg"></div>
  <div class="lumi-orb">🌟</div>
  <div>
    <div class="wtitle">Hola, soy <span>Lumí</span></div>
    <div class="wtitle" style="font-size:1.35rem;color:#c4b5fd;margin-top:.2rem">¡Láminas en Realidad Aumentada!</div>
  </div>
  <div class="wsub">Elegí una lámina, apuntá la cámara y Lumí aparece para enseñarte. 🚀</div>
  <button class="start-btn" onclick="startApp()">✨ ¡Explorar ahora!</button>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="cam-area">
    <!-- Simulated camera background -->
    <canvas id="ar-canvas"></canvas>

    <div id="topbar">
      <div class="logo">Lumí<span>AR</span></div>
      <button class="back-btn" onclick="goBack()">← Salir</button>
    </div>

    <div id="scan-ring">
      <div class="ring"></div>
      <div class="scan-txt">Apuntá la cámara<br>a tu entorno</div>
    </div>
  </div>

  <div id="bottom">
    <div id="tabs">
      <div class="tab active" id="tab-laminas" onclick="showTab('laminas')">🗂 Láminas</div>
      <div class="tab" id="tab-lesson" onclick="showTab('lesson')">💬 Lección</div>
    </div>

    <!-- Láminas -->
    <div id="laminas-panel">
      <div class="laminas-scroll" id="laminasScroll"></div>
    </div>

    <!-- Lección -->
    <div id="lesson-panel">
      <div class="lesson-header">
        <div class="l-avatar">🌟</div>
        <div><div class="l-name">Lumí</div><div class="l-role">Tu explorador del saber</div></div>
      </div>
      <div class="lesson-txt" id="lessonTxt"></div>
      <div class="lesson-nav">
        <button class="nav-btn" onclick="prevStep()">← Ant.</button>
        <div class="dots" id="lessonDots"></div>
        <button class="nav-btn next" onclick="nextStep()">Sig. →</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── STARS ──
const sb = document.getElementById('starsBg');
for(let i=0;i<60;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*3+1;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--o:${(Math.random()*.7+.3).toFixed(2)};animation-delay:${(Math.random()*5).toFixed(1)}s`;
  sb.appendChild(s);
}

// ── DATA ──
const LAMINAS = [
  {
    id:'sistema-solar', label:'Sistema Solar', emoji:'🪐', color:'#1e1b4b',
    bgGrad:['#0f0c2e','#1a1040'],
    arEmoji:'🪐', arColor:'#818cf8',
    pasos:[
      'El <span class="hl">Sistema Solar</span> tiene 8 planetas que orbitan alrededor del Sol. ¡El Sol contiene el 99,8% de toda la masa del sistema! ☀️',
      '<span class="hl">Mercurio</span> es el más cercano al Sol y el más pequeño. Un año en Mercurio dura solo 88 días terrestres. 🌑',
      '<span class="hl">La Tierra</span> es el único planeta conocido con vida. Su atmósfera y el agua líquida la hacen única. 🌍',
      '<span class="hl">Júpiter</span> es el más grande: caben 1.300 Tierras dentro. Su famosa mancha roja es una tormenta de 350 años. 🌀',
      '¡Excelente! Ya conocés los secretos del <span class="hl">cosmos</span>. El universo tiene más estrellas que granos de arena en la Tierra. 🌟'
    ]
  },
  {
    id:'cuerpo-humano', label:'Cuerpo Humano', emoji:'🫀', color:'#1f1235',
    bgGrad:['#1f0a2e','#3b0764'],
    arEmoji:'🫀', arColor:'#e879f9',
    pasos:[
      'El <span class="hl">cuerpo humano</span> tiene más de 37 billones de células. ¡Cada una tiene su propio trabajo! Juntas forman tejidos, órganos y sistemas. 🔬',
      'El <span class="hl">corazón</span> late unas 100.000 veces por día, bombeando 7.500 litros de sangre. Funciona toda tu vida sin parar. ❤️',
      'El <span class="hl">cerebro</span> usa el 20% de la energía del cuerpo aunque pesa solo 1,4 kg. Tiene 86 mil millones de neuronas conectadas. 🧠',
      'Los <span class="hl">huesos</span> son más fuertes que el hormigón. El fémur, el hueso del muslo, aguanta hasta una tonelada de presión. 🦴',
      '¡Fantástico! Tu cuerpo es la máquina más <span class="hl">increíble</span> del universo. ¡Cuidalo con ejercicio, agua y descanso! 💪'
    ]
  },
  {
    id:'animales', label:'Animales', emoji:'🦁', color:'#1a1f0a',
    bgGrad:['#0a1a0c','#1a3a1a'],
    arEmoji:'🦁', arColor:'#4ade80',
    pasos:[
      'El reino animal tiene más de <span class="hl">8 millones</span> de especies conocidas. Los insectos son el grupo más numeroso: ¡hay 1 quintillón de hormigas! 🐜',
      'Los <span class="hl">delfines</span> son uno de los animales más inteligentes. Se reconocen en el espejo, usan herramientas y tienen nombres propios. 🐬',
      'El <span class="hl">pulpo</span> tiene 3 corazones y sangre azul. Sus 8 brazos tienen neuronas propias, ¡casi como cerebros independientes! 🐙',
      'Las <span class="hl">aves migratorias</span> viajan miles de kilómetros siguiendo el campo magnético de la Tierra como una brújula interna. 🦅',
      '¡Increíble! Cada animal tiene <span class="hl">superpoderes</span> únicos. La biodiversidad es el tesoro más grande del planeta. 🌿'
    ]
  },
  {
    id:'agua', label:'Ciclo del Agua', emoji:'💧', color:'#0a1a2e',
    bgGrad:['#0a1a2e','#0e3a5c'],
    arEmoji:'💧', arColor:'#38bdf8',
    pasos:[
      'El <span class="hl">ciclo del agua</span> es el viaje eterno del agua: evapora, sube al cielo, forma nubes y vuelve como lluvia o nieve. 🌧️',
      'La <span class="hl">evaporación</span> ocurre cuando el Sol calienta el agua de mares, ríos y lagos, convirtiéndola en vapor invisible. ☀️',
      'Las <span class="hl">nubes</span> se forman cuando el vapor se enfría y se convierte en millones de gotitas. Un cumulus pesa 500 toneladas. ☁️',
      'La <span class="hl">precipitación</span> devuelve el agua a la Tierra. Una gota tarda hasta 2 horas en caer desde una nube hasta el suelo. 🌂',
      '¡Brillante! El agua que tomás hoy <span class="hl">existió</span> en la época de los dinosaurios. ¡Es eternamente reciclada! 💦'
    ]
  },
  {
    id:'plantas', label:'Las Plantas', emoji:'🌱', color:'#0d1a0d',
    bgGrad:['#0d1a0d','#1a3a1a'],
    arEmoji:'🌱', arColor:'#86efac',
    pasos:[
      'Las plantas hacen <span class="hl">fotosíntesis</span>: usan luz solar, CO₂ y agua para producir glucosa y oxígeno. ¡Son las fábricas de vida! 🌿',
      'Hay más de <span class="hl">390.000 especies</span> de plantas en el mundo. Los árboles pueden vivir miles de años y son el hogar de millones de seres. 🌳',
      'Las raíces no solo anclan la planta: <span class="hl">absorben agua</span> y minerales del suelo, y se comunican con otras plantas mediante hongos. 🍄',
      'Las <span class="hl">flores</span> son órganos reproductivos que atraen insectos con colores y aromas. La polinización alimenta al 75% de los cultivos. 🌸',
      '¡Lo lograste! Las plantas producen el <span class="hl">oxígeno</span> que respirás. Plantar un árbol es el mejor regalo al planeta. 🌍'
    ]
  },
  {
    id:'geometria', label:'Geometría', emoji:'📐', color:'#1a0a1a',
    bgGrad:['#1a0a1a','#2d1b4e'],
    arEmoji:'📐', arColor:'#f472b6',
    pasos:[
      'La <span class="hl">geometría</span> es la rama de las matemáticas que estudia formas, tamaños y posiciones. Está en todas partes de la naturaleza. 🔷',
      'Un <span class="hl">triángulo</span> tiene siempre 180° en sus ángulos. Es la figura más estable: puentes y torres lo usan para no deformarse. 🔺',
      'El <span class="hl">círculo</span> es la figura perfecta: todos sus puntos están a la misma distancia del centro. El número Pi (π≈3.14) lo describe. ⭕',
      'Los <span class="hl">fractales</span> son figuras que se repiten a sí mismas. Los brócolis, los copos de nieve y las costas tienen forma fractal. ❄️',
      '¡Genial! La geometría es el <span class="hl">idioma</span> del universo. Galileo dijo: "El libro de la naturaleza está escrito en matemáticas". 🌌'
    ]
  }
];

// ── STATE ──
let current = 0; // lámina activa
let step = 0;
let animFrame;
let lumiY = 0, lumiDir = 1;
let particles = [];

// ── AR CANVAS ──
const canvas = document.getElementById('ar-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
  const area = document.getElementById('cam-area');
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
}

function initParticles(){
  particles = [];
  const lam = LAMINAS[current];
  for(let i=0;i<18;i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*2.5+1,
      vx:(Math.random()-.5)*.5,
      vy:(Math.random()-.5)*.5,
      alpha: Math.random()*.6+.2
    });
  }
}

function drawAR(){
  resizeCanvas();
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const lam = LAMINAS[current];
  const cx = canvas.width/2;
  const cy = canvas.height/2 - 30;

  // Background gradient
  const bg = ctx.createRadialGradient(cx,cy,10,cx,cy,200);
  bg.addColorStop(0, hexToRgba(lam.arColor,.15));
  bg.addColorStop(1,'transparent');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>canvas.width) p.vx*=-1;
    if(p.y<0||p.y>canvas.height) p.vy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = hexToRgba(lam.arColor, p.alpha);
    ctx.fill();
  });

  // Orbit ring
  const now = Date.now()/1000;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(now*.4);
  ctx.beginPath();
  ctx.arc(0,0,70,0,Math.PI*2);
  ctx.strokeStyle = hexToRgba(lam.arColor,.35);
  ctx.lineWidth=2;
  ctx.setLineDash([8,6]);
  ctx.stroke();
  // dot on orbit
  ctx.beginPath();
  ctx.arc(70,0,5,0,Math.PI*2);
  ctx.fillStyle = lam.arColor;
  ctx.fill();
  ctx.restore();

  // Lumí bounce
  lumiY += .04*lumiDir;
  if(Math.abs(lumiY)>10) lumiDir*=-1;

  // Glow
  const glow = ctx.createRadialGradient(cx,cy+lumiY,5,cx,cy+lumiY,55);
  glow.addColorStop(0,hexToRgba(lam.arColor,.45));
  glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;
  ctx.beginPath();
  ctx.arc(cx,cy+lumiY,55,0,Math.PI*2);
  ctx.fill();

  // Lumí emoji
  ctx.font=`${64}px serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(lam.arEmoji, cx, cy+lumiY);

  // Name tag
  ctx.fillStyle='rgba(10,8,28,.75)';
  roundRect(ctx, cx-58, cy+lumiY+42, 116, 28, 8);
  ctx.fillStyle=lam.arColor;
  ctx.font='bold 13px Nunito,sans-serif';
  ctx.fillText(lam.label, cx, cy+lumiY+56);

  animFrame = requestAnimationFrame(drawAR);
}

function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function roundRect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);
  c.quadraticCurveTo(x,y,x+r,y);c.closePath();c.fill();
}

// ── BUILD LAMINAS ──
function buildLaminas(){
  const scroll = document.getElementById('laminasScroll');
  scroll.innerHTML='';
  LAMINAS.forEach((l,i)=>{
    const div=document.createElement('div');
    div.className='lamina-card'+(i===current?' active':'');
    div.innerHTML=`<div class="lamina-img" style="background:linear-gradient(135deg,${l.bgGrad[0]},${l.bgGrad[1]})">${l.emoji}</div><div class="lamina-label">${l.label}</div>`;
    div.onclick=()=>selectLamina(i);
    scroll.appendChild(div);
  });
}

function selectLamina(i){
  current=i; step=0;
  buildLaminas();
  renderLesson();
  initParticles();
  hideScanRing();
}

// ── LESSON ──
function renderLesson(){
  const lam=LAMINAS[current];
  document.getElementById('lessonTxt').innerHTML=lam.pasos[step];
  const dots=document.getElementById('lessonDots');
  dots.innerHTML=lam.pasos.map((_,i)=>`<div class="dot${i===step?' on':''}"></div>`).join('');
}
function nextStep(){const l=LAMINAS[current];if(step<l.pasos.length-1){step++;renderLesson()}}
function prevStep(){if(step>0){step--;renderLesson()}}

// ── TABS ──
function showTab(t){
  document.getElementById('laminas-panel').style.display=t==='laminas'?'block':'none';
  document.getElementById('lesson-panel').style.display=t==='lesson'?'block':'none';
  document.getElementById('tab-laminas').className='tab'+(t==='laminas'?' active':'');
  document.getElementById('tab-lesson').className='tab'+(t==='lesson'?' active':'');
}

function hideScanRing(){
  const r=document.getElementById('scan-ring');
  r.style.opacity='0';
  setTimeout(()=>r.style.display='none',800);
}

// ── START / BACK ──
function startApp(){
  document.getElementById('welcome').style.display='none';
  document.getElementById('app').classList.add('show');
  buildLaminas();
  renderLesson();
  resizeCanvas();
  initParticles();
  drawAR();
  setTimeout(hideScanRing,3500);
}

function goBack(){
  cancelAnimationFrame(animFrame);
  document.getElementById('app').classList.remove('show');
  document.getElementById('welcome').style.display='flex';
  current=0;step=0;
  document.getElementById('scan-ring').style.display='flex';
  document.getElementById('scan-ring').style.opacity='1';
}

window.addEventListener('resize',resizeCanvas);
</script>
</body>
</html>
